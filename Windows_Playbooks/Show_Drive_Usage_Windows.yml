---
- name: Collect Windows disk and audit log usage
  hosts: windows
  gather_facts: false

  tasks:

    - name: Collect disk usage
      ansible.windows.win_powershell:
        script: |
          Get-CimInstance Win32_LogicalDisk -Filter "DriveType=3" |
          ForEach-Object {
            $size=[math]::Round($_.Size/1GB,2)
            $free=[math]::Round($_.FreeSpace/1GB,2)
            $used=[math]::Round(($_.Size-$_.FreeSpace)/1GB,2)
            $percent=[math]::Round(($used/$size)*100,2)

            "$($_.DeviceID) Size=${size}GB Used=${used}GB Free=${free}GB UsedPercent=${percent}%"
          }
      register: disk_usage

    - name: Collect Windows event log sizes
      ansible.windows.win_powershell:
        script: |
          Get-WinEvent -ListLog Security,Application,System |
          ForEach-Object {
            $current=[math]::Round($_.FileSize/1MB,2)
            $max=[math]::Round($_.MaximumSizeInBytes/1MB,2)

            "$($_.LogName) CurrentSize=${current}MB MaxSize=${max}MB"
          }
      register: log_usage

    - name: Store results as host facts
      ansible.builtin.set_fact:
        disk_report: "{{ disk_usage.output | default([]) }}"
        log_report: "{{ log_usage.output | default([]) }}"

- name: Aggregate report on control node
  hosts: localhost
  gather_facts: false

  vars:
    report_file: "/tmp/windows_storage_report.txt"

  tasks:

    - name: Create aggregated report
      ansible.builtin.copy:
        dest: "{{ report_file }}"
        content: |
          ===== Windows Storage Report =====

          {% for host in groups['windows'] %}
          Host: {{ host }}

          --- Disk Usage ---
          {% for line in hostvars[host].disk_report %}
          {{ line }}
          {% endfor %}

          --- Event Logs ---
          {% for line in hostvars[host].log_report %}
          {{ line }}
          {% endfor %}

          ----------------------------------

          {% endfor %}