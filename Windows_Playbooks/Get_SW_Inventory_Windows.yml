---
- name: Collect Windows software inventory
  hosts: windows
  gather_facts: false

  tasks:

    - name: Get installed software from registry
      ansible.windows.win_powershell:
        script: |
          $paths = @(
            "HKLM:\Software\Microsoft\Windows\CurrentVersion\Uninstall\*",
            "HKLM:\Software\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\*"
          )

          $apps = foreach ($path in $paths) {
            Get-ItemProperty $path -ErrorAction SilentlyContinue |
            Where-Object { $_.DisplayName } |
            Select-Object DisplayName, DisplayVersion, Publisher
          }

          $apps | Sort-Object DisplayName | ForEach-Object {
            "$($_.DisplayName) | Version: $($_.DisplayVersion) | Publisher: $($_.Publisher)"
          }
      register: software_inventory

    - name: Save host software inventory
      ansible.builtin.set_fact:
        host_software: "{{ software_inventory.output | default([]) }}"

- name: Aggregate inventory report
  hosts: localhost
  gather_facts: false

  vars:
    report_file: "/tmp/windows_software_inventory.txt"

  tasks:

    - name: Write aggregated software inventory
      ansible.builtin.copy:
        dest: "{{ report_file }}"
        content: |
          ===== Windows Software Inventory =====
          Generated by Ansible

          {% for host in groups['windows'] %}

          Host: {{ host }}
          --------------------------------------

          {% for app in hostvars[host].host_software %}
          {{ app }}
          {% endfor %}

          {% endfor %}