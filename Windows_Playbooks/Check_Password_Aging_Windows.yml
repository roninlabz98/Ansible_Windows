---
- name: Check password aging policy for local Windows accounts
  hosts: windows
  gather_facts: no
  vars:
    output_file: "/tmp/windows_password_aging.txt"

  tasks:

    - name: Query local user password aging info
      win_shell: |
        $users = Get-LocalUser
        $results = @()

        foreach ($u in $users) {
            $pwd = net user $u.Name | Out-String

            # Extract human-readable fields from "net user"
            $lastSet      = ($pwd | Select-String "Password last set").ToString().Trim()
            $expiresOnRaw = ($pwd | Select-String "Password expires").ToString().Trim()
            $acctExpires  = ($pwd | Select-String "Account expires").ToString().Trim()

            # Convert .NET /Date(xxxxx)/ format if present
            if ($u.PasswordExpires -match "\/Date\((\d+)\)\/") {
                $expiresConverted = ([DateTimeOffset]::FromUnixTimeMilliseconds($Matches[1])).DateTime
            } else {
                $expiresConverted = $u.PasswordExpires
            }

            $results += [PSCustomObject]@{
                UserName           = $u.Name
                Enabled            = $u.Enabled
                PasswordRequired   = $u.PasswordRequired
                PasswordExpires    = $expiresConverted
                PasswordChangeable = $u.PasswordChangeable
                PasswordLastSet    = $lastSet
                PasswordExpiresOn  = $expiresOnRaw
                AccountExpires     = $acctExpires
            }
        }

        $results | ConvertTo-Json -Depth 4
      register: user_info_raw

    - name: Convert JSON to structured data
      set_fact:
        user_info: "{{ user_info_raw.stdout | from_json }}"

    - name: Build report block for this host
      set_fact:
        report_block: |
          ============================================================
          Host: {{ inventory_hostname }}
          ============================================================
          {% for u in user_info %}
          User: {{ u.UserName }}
            Enabled: {{ u.Enabled }}
            Password Required: {{ u.PasswordRequired }}
            Password Expires: {{ u.PasswordExpires }}
            Password Changeable: {{ u.PasswordChangeable }}
            {{ u.PasswordLastSet }}
            {{ u.PasswordExpiresOn }}
            {{ u.AccountExpires }}
          ------------------------------------------------------------
          {% endfor %}

    - name: Append results to aggregated report on control node
      delegate_to: localhost
      lineinfile:
        path: "{{ output_file }}"
        line: "{{ report_block }}"
        create: yes
